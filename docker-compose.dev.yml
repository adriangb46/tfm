services:
  db_sql:
    image: postgres:15
    container_name: db_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgress
      POSTGRES_DB: tfm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - tfm_net_dev
  
  mongodb:
    image: mongo:7.0
    container_name: mongodb_dev
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - tfm_net_dev
    volumes:
      - mongodb_data_dev:/data/db
    restart: unless-stopped

  db_server:
    image: eclipse-temurin:25-jdk
    container_name: db_server_dev
    working_dir: /app
    volumes:
      - ./db_back:/app
      - ~/.m2:/root/.m2
    ports:
      - "8080:8080"
    # Runs the app directly using the Maven wrapper, enabling hot-reload if configured
    command: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
    networks:
      - tfm_net_dev
    depends_on:
      - db_sql
      - mongodb

  middle_server:
    image: node:20-alpine
    container_name: middle_server_dev
    working_dir: /app
    volumes:
      - ./middle_server:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_AVATARS=avatars
      - MINIO_PUBLIC_BASE_URL=http://localhost:9000/avatars
    # Assumes index.js is the entry point. You can add nodemon here if available
    command: node index.js
    networks:
      - tfm_net_dev
    depends_on:
      - db_server
      - minio

  minio:
    image: minio/minio
    container_name: minio_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data_dev:/data
    command: server /data --console-address ":9001"
    networks:
      - tfm_net_dev
    restart: unless-stopped

  minio_init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/avatars;
      /usr/bin/mc anonymous set public myminio/avatars;
      exit 0;
      "
    networks:
      - tfm_net_dev

  front:
    image: node:20-alpine
    container_name: front_dev
    working_dir: /app
    volumes:
      - ./front:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    # Runs ng serve for hot-module replacement
    command: sh -c "npm install && npx ng serve --host 0.0.0.0 --disable-host-check"
    networks:
      - tfm_net_dev
    depends_on:
      - middle_server

volumes:
  postgres_data_dev:
    driver: local
  mongodb_data_dev:
    driver: local
  minio_data_dev:
    driver: local

networks:
  tfm_net_dev:
    driver: bridge

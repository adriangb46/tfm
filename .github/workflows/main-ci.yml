name: Full Stack Aggregator (TFM Orchestrator)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # Use the root repository name for the namespace
  IMAGE_BASE: ${{ github.repository }}

jobs:
  aggregate-and-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout root repository
        uses: actions/checkout@v6

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          # Use GH_PAT to have access to other private repositories' images
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Lowercase IMAGE_BASE
        run: |
          echo "IMAGE_BASE_LOWER=$(echo ${{ env.IMAGE_BASE }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # ---------------------------------------------------------
      # 1. Pull, Re-tag and Push Custom Services from Sub-repos
      # ---------------------------------------------------------

      - name: Aggregate Custom Services
        if: github.event_name != 'pull_request'
        run: |
          # Define source and destination mappings
          # Format: "source_image|destination_suffix"
          declare -a SERVICES=(
            "agb4455/proyectointermodulardambackend-db-back|db-server"
            "adriangb46/proyectointermodulardamservidorintermedio-middle-server|middle-server"
            "agb4455/proyectointermodulardamfrontend-front|frontend"
          )

          for ENTRY in "${SERVICES[@]}"; do
            IFS='|' read -r SRC_REPO SUFFIX <<< "$ENTRY"
            
            SRC="${{ env.REGISTRY }}/$SRC_REPO:latest"
            DEST="${{ env.REGISTRY }}/${{ env.IMAGE_BASE_LOWER }}-$SUFFIX:latest"
            
            echo "Aggregating $SRC into $DEST"
            docker pull $SRC
            docker tag $SRC $DEST
            docker push $DEST
          done

      # ---------------------------------------------------------
      # 2. Package Infrastructure Images (Full Package)
      # ---------------------------------------------------------

      - name: Package Infrastructure Images
        if: github.event_name != 'pull_request'
        run: |
          # Define images to package
          declare -A IMAGES=(
            ["postgres:15"]="database-sql"
            ["mongo:7.0"]="database-nosql"
            ["redis:7-alpine"]="cache-redis"
            ["minio/minio"]="storage-minio"
          )

          for SRC in "${!IMAGES[@]}"; do
            DEST="${{ env.REGISTRY }}/${{ env.IMAGE_BASE_LOWER }}-${IMAGES[$SRC]}:latest"
            echo "Packaging $SRC as $DEST"
            docker pull $SRC
            docker tag $SRC $DEST
            docker push $DEST
          done

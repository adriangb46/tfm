<!-- PREVIEW ONLY — not production code -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Config Refined Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg-primary: #0d0c18;
            --color-bg-secondary: #1a1830;
            --color-bg-card: #211f38;
            --color-bg-tertiary: #141220;
            --color-bg-glass: rgba(33, 31, 56, 0.7);
            --color-text-primary: #e8e0d0;
            --color-text-secondary: #b8a898;
            --color-gold: #c9a84c;
            --color-border-default: #3a3555;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--color-bg-primary); color: var(--color-text-primary); font-family: 'Outfit', sans-serif; overflow: hidden; }

        .navbar { height: 72px; background: var(--color-bg-secondary); border-bottom: 1px solid var(--color-border-default); flex-shrink: 0; }

        .config-container {
            display: flex;
            flex-direction: column;
            height: calc(100% - 72px);
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            gap: 1.5rem;
        }

        .header h1 { font-family: 'Cinzel', serif; color: var(--color-gold); margin: 0; font-size: 1.8rem; text-align: center; }

        .main-layout {
            display: flex;
            flex-grow: 1;
            min-height: 0;
            gap: 2rem;
        }

        .sidebar {
            width: 300px;
            flex-shrink: 0;
            background: var(--color-bg-glass);
            border: 1px solid var(--color-border-default);
            border-radius: 12px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .avatar { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--color-gold); background: var(--color-bg-card); }

        .form-scroll-area {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .form-scroll-area::-webkit-scrollbar { width: 4px; }
        .form-scroll-area::-webkit-scrollbar-thumb { background: var(--color-border-default); border-radius: 10px; }

        .card { background: var(--color-bg-card); border-radius: 12px; padding: 1.5rem; border: 1px solid var(--color-border-default); }
        .card-header { font-family: 'Cinzel', serif; color: var(--color-text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--color-border-default); padding-bottom: 0.5rem; }

        .form-row { display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
        .info-txt { flex: 1; min-width: 0; }
        .label { display: block; font-weight: 600; margin-bottom: 0.2rem; }
        .desc { font-size: 0.8rem; color: var(--color-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .flag-selector { display: flex; gap: 0.6rem; }
        .flag-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--color-border-default); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.1rem; background: var(--color-bg-tertiary); transition: all 0.2s; }
        .flag-btn.active { border-color: var(--color-gold); box-shadow: 0 0 10px rgba(201,168,76,0.3); }

        input { background: var(--color-bg-tertiary); border: 1px solid var(--color-border-default); color: white; padding: 0.7rem; border-radius: 6px; width: 250px; }

        .toggle-switch { width: 46px; height: 24px; background: var(--color-bg-tertiary); border: 2px solid var(--color-border-default); border-radius: 12px; position: relative; cursor: pointer; flex-shrink: 0; }
        .toggle-switch.active { background: var(--color-gold); border-color: var(--color-gold); }
        .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: 0.3s; }
        .toggle-switch.active::after { left: 24px; }

        .footer { display: flex; justify-content: flex-end; gap: 1rem; padding-top: 1rem; border-top: 1px solid var(--color-border-default); flex-shrink: 0; }
        .btn { padding: 0.8rem 1.8rem; border-radius: 6px; font-weight: 700; cursor: pointer; border: none; font-family: 'Cinzel', serif; text-transform: uppercase; }
        .btn-gold { background: var(--color-gold); color: black; }
        .btn-ghost { background: transparent; color: var(--color-text-secondary); }

        /* Media Query para Móvil */
        @media (max-width: 850px) {
            body, html { overflow-y: auto; }
            .config-container { height: auto; padding: 1rem; gap: 1.5rem; }
            .main-layout { flex-direction: column; overflow: visible; }
            .sidebar { width: 100%; }
            .form-scroll-area { overflow: visible; padding-right: 0; }
            
            /* El input de email sigue apilándose porque es largo */
            .form-row.stack-mobile { flex-direction: column; align-items: stretch; }
            .form-row.stack-mobile input { width: 100%; }

            /* Los demás controles se mantienen AL LADO del texto */
            .form-row { flex-direction: row; align-items: center; }
            .btn-mobile-small { padding: 0.5rem 0.8rem !important; font-size: 0.7rem !important; }
            
            .footer { position: sticky; bottom: 0; background: var(--color-bg-primary); padding: 1rem 0; margin-top: 2rem; }
        }
    </style>
</head>
<body>
    <div class="navbar"></div>
    <div class="config-container">
        <header class="header">
            <h1>CONFIGURACIÓN</h1>
        </header>
        
        <div class="main-layout">
            <aside class="sidebar">
                <div class="avatar"></div>
                <div style="text-align: center;">
                    <h2 style="margin: 0; font-family: 'Cinzel', serif; color: var(--color-gold);">RAGNAR</h2>
                    <p style="margin: 5px 0; color: var(--color-text-secondary); font-size: 0.9rem;">CLAN FURY</p>
                </div>
            </aside>

            <div class="form-scroll-area">
                <section class="card">
                    <div class="card-header">IDENTIDAD</div>
                    <div class="form-row stack-mobile">
                        <div class="info-txt">
                            <span class="label">Correo Sagrado</span>
                            <span class="desc">Tu vínculo con el Valhalla</span>
                        </div>
                        <input type="email" value="ragnar@valhalla.com">
                    </div>
                </section>

                <section class="card">
                    <div class="card-header">SEGURIDAD</div>
                    <div class="form-row">
                        <div class="info-txt">
                            <span class="label">Contraseña</span>
                            <span class="desc">Asegura tu acceso</span>
                        </div>
                        <button class="btn btn-ghost btn-mobile-small" style="border: 1px solid var(--color-gold); color: var(--color-gold); font-family: 'Outfit';">CAMBIAR CLAVE</button>
                    </div>
                </section>

                <section class="card">
                    <div class="card-header">PREFERENCIAS</div>
                    <div class="form-row">
                        <div class="info-txt">
                            <span class="label">Lengua del Clan</span>
                            <span class="desc">Idioma de la batalla</span>
                        </div>
                        <div class="flag-selector">
                            <div class="flag-btn active">🇪🇸</div>
                            <div class="flag-btn">🇬🇧</div>
                        </div>
                    </div>
                    <div class="form-row" style="margin-top: 1rem;">
                        <div class="info-txt">
                            <span class="label">Modo Oscuro</span>
                            <span class="desc">Noche eterna</span>
                        </div>
                        <div class="toggle-switch active"></div>
                    </div>
                </section>
            </div>
        </div>

        <footer class="footer">
            <button class="btn btn-ghost">DESCARTAR</button>
            <button class="btn btn-gold">GUARDAR CAMBIOS</button>
        </footer>
    </div>
</body>
</html>

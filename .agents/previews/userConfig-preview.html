<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview: User Config - Viking Clan Wars</title>
    <!-- PREVIEW ONLY — not production code -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg-primary: #0d0c18;
            --color-bg-secondary: #1a1830;
            --color-bg-card: #211f38;
            --color-bg-modal: #252342;
            --color-text-primary: #e8e0d0;
            --color-text-secondary: #b8a898;
            --color-gold: #c9a84c;
            --color-gold-light: #e8c96a;
            --color-gold-dark: #9a7a30;
            --color-border-default: #3a3555;
            --color-border-strong: #c9a84c;
            --color-success: #2d8a4e;
            --color-error: #c0392b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--color-bg-primary);
            color: var(--color-text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3 {
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .config-page-container {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            padding: 2rem;
        }

        .hero-banner {
            margin-bottom: 2rem;
            text-align: center;
            border-bottom: 2px solid var(--color-gold);
            padding-bottom: 1rem;
        }

        .hero-banner h1 {
            color: var(--color-gold);
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(201, 168, 76, 0.3);
        }

        .config-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
        }

        /* Sidebar */
        .profile-sidebar {
            background: var(--color-bg-secondary);
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--color-border-default);
        }

        .avatar-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 1.5rem;
        }

        .avatar-container {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--color-gold);
            background: var(--color-bg-card);
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .edit-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--color-gold);
            color: var(--color-bg-primary);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .edit-badge:hover {
            transform: scale(1.1);
            background: var(--color-gold-light);
        }

        .edit-badge svg {
            width: 18px;
            height: 18px;
        }

        .profile-info h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .profile-info p {
            color: var(--color-text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        /* Form */
        .config-form {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .form-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-header h3 {
            color: var(--color-gold);
            font-size: 1.2rem;
            white-space: nowrap;
        }

        .section-header .line {
            height: 1px;
            background: var(--color-border-default);
            flex-grow: 1;
        }

        .action-card {
            background: var(--color-bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--color-border-default);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .info-group .label {
            font-weight: 700;
            color: var(--color-text-primary);
            font-size: 1rem;
        }

        .info-group .desc {
            color: var(--color-text-secondary);
            font-size: 0.85rem;
        }

        .input-wrapper {
            width: 300px;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            background: var(--color-bg-primary);
            border: 1px solid var(--color-border-default);
            color: var(--color-text-primary);
            padding: 0.75rem 1rem;
            border-radius: 6px;
            outline: none;
            font-family: inherit;
        }

        input:focus {
            border-color: var(--color-gold);
            box-shadow: 0 0 0 2px rgba(201, 168, 76, 0.2);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            transition: all 0.2s;
            border: none;
        }

        .btn-gold {
            background: var(--color-gold);
            color: var(--color-bg-primary);
        }

        .btn-gold:hover {
            background: var(--color-gold-light);
            box-shadow: 0 4px 12px rgba(201, 168, 76, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--color-gold);
            color: var(--color-gold);
        }

        .btn-outline:hover {
            background: rgba(201, 168, 76, 0.1);
        }

        .btn-ghost {
            background: transparent;
            color: var(--color-text-secondary);
        }

        .btn-ghost:hover {
            color: var(--color-text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .select-themed {
            background: var(--color-bg-primary);
            border: 1px solid var(--color-border-default);
            color: var(--color-text-primary);
            padding: 0.75rem 1rem;
            border-radius: 6px;
            outline: none;
            width: 300px;
        }

        .toggle-switch {
            width: 50px;
            height: 24px;
            background: var(--color-bg-primary);
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            border: 1px solid var(--color-border-default);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 3px;
            width: 16px;
            height: 16px;
            background: var(--color-text-secondary);
            border-radius: 50%;
            transition: all 0.3s;
        }

        .toggle-switch.active {
            background: var(--color-gold-muted);
            border-color: var(--color-gold);
        }

        .toggle-switch.active::after {
            left: 28px;
            background: var(--color-gold);
        }

        .config-footer {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1rem;
        }

        @media (max-width: 800px) {
            .config-content {
                grid-template-columns: 1fr;
            }
            .profile-sidebar {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="config-page-container">
        <header class="hero-banner">
            <h1>CONFIGURACIÓN DE GUERRERO</h1>
        </header>

        <main class="config-content">
            <!-- Sidebar: Identidad y Avatar -->
            <aside class="profile-sidebar">
                <div class="avatar-wrapper">
                    <div class="avatar-container">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Ragnar" alt="Avatar">
                    </div>
                    <div class="edit-badge" title="Cambiar Avatar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                        </svg>
                    </div>
                </div>
                <div class="profile-info">
                    <h2>Ragnar</h2>
                    <p>Clan Berserker</p>
                </div>
            </aside>

            <!-- Formulario de Configuración -->
            <div class="config-form">
                
                <!-- Sección: Identidad -->
                <section class="form-section">
                    <div class="section-header">
                        <h3>Identidad</h3>
                        <div class="line"></div>
                    </div>
                    
                    <div class="action-card">
                        <!-- El campo de nombre ha sido eliminado de aquí ya que aparece en el sidebar -->
                        <div class="card-row">
                            <div class="info-group">
                                <span class="label">Correo sagrado</span>
                                <span class="desc">Vinculado a tu alma de combate</span>
                            </div>
                            <div class="input-wrapper">
                                <input type="email" value="ragnar@valhalla.com">
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Sección: Seguridad -->
                <section class="form-section">
                    <div class="section-header">
                        <h3>Seguridad</h3>
                        <div class="line"></div>
                    </div>
                    <div class="action-card">
                        <div class="card-row">
                            <div class="info-group">
                                <span class="label">Contraseña</span>
                                <span class="desc">Protege tu acceso al Valhalla</span>
                            </div>
                            <button class="btn btn-outline">CAMBIAR CLAVE</button>
                        </div>
                    </div>
                </section>

                <!-- Sección: Preferencias -->
                <section class="form-section">
                    <div class="section-header">
                        <h3>Preferencias</h3>
                        <div class="line"></div>
                    </div>
                    <div class="action-card">
                        <div class="card-row">
                            <div class="info-group">
                                <span class="label">Lengua del Clan</span>
                                <span class="desc">Idioma de la interfaz</span>
                            </div>
                            <select class="select-themed">
                                <option selected>Español (ES)</option>
                                <option>English (EN)</option>
                            </select>
                        </div>
                        <div class="card-row">
                            <div class="info-group">
                                <span class="label">Modo Oscuro</span>
                                <span class="desc">Noche eterna en Midgard</span>
                            </div>
                            <div class="toggle-switch active"></div>
                        </div>
                    </div>
                </section>

                <!-- Acciones Finales -->
                <footer class="config-footer">
                    <button class="btn btn-ghost">DESCARTAR</button>
                    <button class="btn btn-gold">GUARDAR CAMBIOS</button>
                </footer>

            </div>
        </main>
    </div>
</body>
</html>

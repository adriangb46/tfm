<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview - Configuración</title>
    <style>
        /* CSS Custom Properties from front_color_guide.md */
        :root, [data-theme="dark"] {
            --color-bg-primary: #0d0c18;
            --color-bg-card: #211f38;
            --color-bg-tertiary: #141220;
            --color-text-primary: #e8e0d0;
            --color-text-secondary: #b8a898;
            --color-gold: #c9a84c;
            --color-gold-light: #e8c96a;
            --color-border-default: #3a3555;
            --color-border-faint: #252342;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--color-bg-primary);
            color: var(--color-text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .config-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--color-bg-card);
            border: 1px solid var(--color-border-faint);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .config-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .avatar-wrapper {
            position: relative;
            display: inline-block;
        }

        .avatar-container {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--color-bg-tertiary);
            color: var(--color-gold);
            border: 3px solid var(--color-border-default);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .avatar-container:hover {
            border-color: var(--color-gold);
            box-shadow: 0 0 10px rgba(201, 168, 76, 0.3);
        }

        .edit-avatar-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: var(--color-gold);
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--color-bg-card);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .edit-avatar-btn:hover {
            background-color: var(--color-gold-light);
            transform: scale(1.1);
        }

        .user-info {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-grow: 1;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        .input-group label {
            font-size: 0.85rem;
            color: var(--color-text-secondary);
        }

        .input-field {
            background-color: var(--color-bg-tertiary);
            border: 1px solid var(--color-border-default);
            color: var(--color-text-primary);
            padding: 0.5rem 0.8rem;
            border-radius: 4px;
            font-size: 1rem;
        }
        
        .input-field:focus {
            outline: none;
            border-color: var(--color-gold);
        }
        
        .user-name-text {
            color: var(--color-text-primary);
            font-size: 1.5rem;
            font-weight: bold;
            padding: 0;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .user-email-text {
            color: var(--color-text-secondary);
            font-size: 0.9rem;
            font-weight: 400;
            padding: 0;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .divider {
            height: 1px;
            background-color: var(--color-border-default);
            opacity: 0.5;
            width: 100%;
        }

        .config-body {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-primary {
            background-color: var(--color-gold);
            color: #000;
        }
        
        .btn-primary:hover {
            background-color: var(--color-gold-light);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--color-text-secondary);
            border: 1px solid var(--color-border-default);
        }
        
        .btn-secondary:hover {
            color: var(--color-text-primary);
            border-color: var(--color-text-primary);
        }

        select.input-field {
            cursor: pointer;
            padding-right: 2rem;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23b3b3b3%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 0.7rem top 50%;
            background-size: 0.65rem auto;
        }

        /* Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--color-bg-tertiary);
            transition: .4s;
            border: 1px solid var(--color-border-default);
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: var(--color-text-secondary);
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--color-gold);
            border-color: var(--color-gold);
        }
        input:checked + .slider:before {
            transform: translateX(26px);
            background-color: #000;
        }

        .config-footer {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .preview-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #8b2222;
            color: white;
            text-align: center;
            padding: 5px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="preview-banner">PREVIEW ONLY — not production code</div>
    
    <div class="config-container">
        <!-- HEADER: Avatar + Name + Email -->
        <div class="config-header">
            <div class="avatar-wrapper">
                <div class="avatar-container" title="Cambiar Avatar">
                    <svg fill="currentColor" viewBox="0 0 24 24" width="40" height="40">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path>
                    </svg>
                </div>
                <div class="edit-avatar-btn" title="Editar Avatar">
                    <svg fill="currentColor" viewBox="0 0 24 24" width="16" height="16">
                        <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34a.9959.9959 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"></path>
                    </svg>
                </div>
            </div>
            <div class="user-info">
                <div class="user-name-text">Viking Warrior</div>
                <div class="user-email-text">viking@valhalla.com</div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- BODY: Password, Language, Theme -->
        <div class="config-body">
            <div style="display: flex; gap: 1rem; margin-bottom: 0.5rem; justify-content: center;">
                <button class="btn btn-secondary">Cambiar correo</button>
                <button class="btn btn-secondary">Cambiar contraseña</button>
            </div>

            <div class="setting-row">
                <span style="font-weight: 500;">Idioma</span>
                <select class="input-field" style="width: 120px;">
                    <option value="ES" selected>Español</option>
                    <option value="EN">Inglés</option>
                </select>
            </div>

            <div class="setting-row">
                <span style="font-weight: 500;">Modo oscuro</span>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <!-- FOOTER: Actions -->
        <div class="config-footer">
            <button class="btn btn-primary">Guardar</button>
            <button class="btn btn-secondary">Cancelar</button>
        </div>
    </div>
</body>
</html>

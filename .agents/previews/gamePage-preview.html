<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview - Game Page (Batalla)</title>
    <style>
        /* CSS Variables from tokens.scss - Mythic Viking */
        :root, [data-theme="dark"] {
            --color-bg-primary:   #0d0c18;
            --color-bg-secondary: #1a1830;
            --color-bg-tertiary:  #141220;
            --color-bg-card:      #211f38;
            --color-border-strong:  #c9a84c;
            --color-border-default: #3a3555;
            --color-text-primary:   #e8e0d0;
            --color-text-secondary: #b8a898;
            
            --color-gold:        #c9a84c;
            --color-gold-light:  #e8c96a;
            --color-gold-dark:   #9a7a30;
            
            --color-phase-preparation: #4a90d9;
            --color-phase-war:         #c0392b;
            --color-phase-end:         #c9a84c;
            
            --color-error:       #c0392b;
            --color-progress-health:   #2d8a4e;
        }

        /* Reset & Font */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--color-bg-primary);
            color: var(--color-text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ----- TOP BAR ----- */
        .topbar {
            height: 64px;
            background-color: var(--color-bg-card);
            border-bottom: 2px solid var(--color-border-default);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 20%;
        }
        .btn-back {
            background: none;
            border: none;
            color: var(--color-text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .btn-back:hover {
            color: var(--color-gold);
        }

        /* Game logo placeholder */
        .game-logo {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--color-bg-card), var(--color-bg-tertiary));
            border: 2px solid var(--color-gold);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-gold);
            font-size: 1.2rem;
        }

        /* Username + game number block */
        .player-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
        }
        .player-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--color-text-primary);
            line-height: 1;
        }
        .game-number {
            font-size: 0.72rem;
            color: var(--color-text-secondary);
            letter-spacing: 0.5px;
        }

        .topbar-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }
        .phase-indicator {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--color-phase-preparation); 
            letter-spacing: 1px;
            text-transform: uppercase;
            background-color: var(--color-bg-tertiary); /* Dark card base */
            border: 2px solid var(--color-phase-preparation); /* Colored border to match phase */
            padding: 8px 24px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(74, 144, 217, 0.15); /* Glowing effect */
        }
        .stats-card {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(33, 31, 56, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(201, 168, 76, 0.4);
            border-radius: 12px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 0.9rem;
            color: var(--color-text-secondary);
            z-index: 20;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }
        /* Divisor vertical entre vida y el bloque derecho */
        .stats-divider {
            width: 1px;
            height: 36px;
            background-color: rgba(201, 168, 76, 0.3);
        }
        /* Columna izquierda: solo Vida */
        .stat-health-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .stat-health-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--color-text-secondary);
        }
        .stat-health-value {
            font-size: 1rem;
            font-weight: 800;
            color: var(--color-progress-health);
        }
        /* Columna derecha: dinero + investigacion en filas */
        .stat-right-block {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
        }
        .stat-value {
            color: var(--color-text-primary);
            font-weight: bold;
        }
        .stat-value.gold { color: var(--color-gold); }

        .topbar-right {
            width: 25%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
        }
        .btn-rules {
            background-color: transparent;
            border: 1px solid var(--color-border-default);
            color: var(--color-text-secondary);
            padding: 8px 14px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-rules:hover {
            border-color: var(--color-gold);
            color: var(--color-gold);
        }

        .btn-abandon {
            background-color: transparent;
            border: 1px solid var(--color-error);
            color: var(--color-error);
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-abandon:hover {
            background-color: var(--color-error);
            color: white;
        }

        /* ----- MAIN AREA ----- */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ----- MAP VIEW ----- */
        .map-container {
            flex: 1;
            position: relative;
            background-color: var(--color-bg-primary); /* Fallback */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .map-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('../../front/public/viking-map-continents.png');
            background-size: 100% 100%; /* Stretch image to fill container completely */
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.8;
        }

        /* Player Nodes / Territories on Map */
        .territory-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none; /* Let clicks pass unless on specific shapes */
        }

        .attack-path-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .attack-path {
            stroke: #c9a84c;
            stroke-width: 0.8;
            fill: none;
            opacity: 0.18;
            stroke-linecap: round;
            filter: drop-shadow(0 0 2px rgba(201, 168, 76, 0.45));
        }

        .attack-text {
            font-family: var(--font-title, 'Inter'), system-ui, sans-serif;
            font-size: 3px;
            fill: rgba(201, 168, 76, 0.95);
            fill-opacity: 0.6;
            font-weight: 900;
            pointer-events: none;
        }

        .attack-text textPath {
            dominant-baseline: central;
        }

        .attack-path-marker {
            fill: transparent;
        }

        .player-node {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #e8e0d0;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
            transition: all 0.2s ease-out;
            text-shadow: 1px 1px 3px black;
            font-size: 0.85rem;
            text-transform: uppercase;
            transform: translate(-50%, -50%); /* Keeps node perfectly centered on its % coordinate */
        }

        .player-node:hover {
            transform: translate(-50%, -50%) scale(1.15); /* Keep translation on hover */
            box-shadow: 0 0 25px rgba(255,255,255,0.4);
            z-index: 5;
        }

        /* Positions mapped to continents % */
        .node-divine { top: 26%; left: 23%; background-color: rgba(74, 144, 217, 0.5); border: 2px solid #4a90d9; } /* Niflheim */
        .node-iron   { top: 17%; left: 66%; background-color: rgba(138, 155, 168, 0.5); border: 2px solid #8a9ba8; } /* Jötunheim */
        .node-song   { top: 78%; left: 22%; background-color: rgba(139, 92, 246, 0.5); border: 2px solid #8b5cf6; } /* Muspelheim */
        .node-fury   { top: 51%; left: 71%; background-color: rgba(192, 57, 43, 0.5); border: 2px solid #c0392b; } /* Midgard */
        .node-rune   { top: 81%; left: 77%; background-color: rgba(16, 185, 129, 0.5); border: 2px solid #10b981; } /* Vanaheim */
        .node-death  { top: 56%; left: 38%; background-color: rgba(124, 107, 158, 0.5); border: 2px solid #7c6b9e; } /* Åsgard (Center) */

        /* ----- FLOATING ACTIONS (Right) ----- */
        .actions-overlay {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 20;
        }

        .action-btn {
            background-color: rgba(33, 31, 56, 0.7); /* Semitransparent card */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--color-gold-light);
            border: 2px solid rgba(201, 168, 76, 0.4);
            width: 56px;
            height: 56px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }
        .action-btn:hover {
            border-color: var(--color-gold);
            background-color: rgba(201, 168, 76, 0.15);
            transform: scale(1.1) translateY(-2px);
            color: white;
        }

        /* Modal Overlay (hidden by default, shown for preview purposes) */
        .modal-overlay {
            display: none; /* change to flex to preview modal */
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.72);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- TOP BAR -->
    <header class="topbar">
        <div class="topbar-left">
            <button class="btn-back" title="Volver al Lobby">←</button>
            <!-- Game logo placeholder -->
            <div class="game-logo" title="Viking Clan Wars">⚔️</div>
            <!-- User info -->
            <div class="player-info">
                <span class="player-name">Ragnar_Fury</span>
                <span class="game-number">#3F8A2C</span>
            </div>
        </div>

        <div class="topbar-center">
            <div class="phase-indicator">FASE: PREPARACIÓN</div>
        </div>

        <div class="topbar-right">
            <button class="btn-rules" title="Ver Reglas del Juego" onclick="alert('Modal: Reglas del Juego')">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                Reglas
            </button>
            <button class="btn-abandon">Abandonar</button>
        </div>
    </header>

    <!-- MAIN AREA -->
    <main class="main-content">
        <!-- Floating Stats Card -->
        <div class="stats-card">
            <!-- Izquierda: Vida -->
            <div class="stat-health-block">
                <span class="stat-health-label">Vida</span>
                <span class="stat-health-value">3000 / 3000</span>
            </div>
            <!-- Divisor -->
            <div class="stats-divider"></div>
            <!-- Derecha: Dinero + Puntos de Investigación -->
            <div class="stat-right-block">
                <div class="stat-item">
                    <span>Dinero:</span>
                    <span class="stat-value gold">150 💰</span>
                </div>
                <div class="stat-item">
                    <span>Ptos. Inv:</span>
                    <span class="stat-value">25 🧪</span>
                </div>
            </div>
        </div>

        <!-- Center Map -->
        <div class="map-container">
            <div class="map-bg"></div>
            
            <svg class="attack-path-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
                <path class="attack-path" id="attack-path-preview" d="M 71 51 C 70 38, 68 27, 66 17" />
                <text class="attack-text">
                    <textPath xlink:href="#attack-path-preview" startOffset="0%">
                        >
                        <animate attributeName="startOffset" from="0%" to="100%" dur="4s" repeatCount="indefinite" />
                    </textPath>
                </text>
            </svg>

            <div class="territory-overlay">
                <!-- Players placed on the map continents -->
                <div class="player-node node-divine" title="Clan Divine">Divine</div>
                <div class="player-node node-death" title="Clan Death">Death</div>
                <div class="player-node node-fury" title="Tú (FURY)">Tú</div>
                <div class="player-node node-iron" title="Clan Iron">Iron</div>
                <div class="player-node node-song" title="Clan Song">Song</div>
                <div class="player-node node-rune" title="Clan Rune">Rune</div>
            </div>
        </div>

        <!-- Right Floating Actions (Icons Instead of Text) -->
        <div class="actions-overlay">
            <button class="action-btn" title="Entrenar Tropas" onclick="alert('Abre modal: Entrenar Tropas')">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14.5 17.5L3 6V3h3l11.5 11.5"></path><path d="M13 19l6-6"></path><path d="M16 16l4 4"></path><path d="M19 21l2-2"></path></svg>
            </button>
            
            <button class="action-btn" title="Ver Tropas" onclick="alert('Abre modal: Tropas')">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            </button>
            
            <button class="action-btn" title="Árbol Tecnológico" onclick="alert('Abre modal: Árbol Tecnológico')">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
            </button>
            
            <button class="action-btn" title="Log de Batalla" onclick="alert('Abre modal: Log')">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            </button>
        </div>
    </main>

    <!-- Dummy overlay for future preview of modals -->
    <div class="modal-overlay"></div>

</body>
</html>

<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración — Viking Clan Wars</title>
    <!-- PREVIEW ONLY — not production code -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dark Theme tokens from front_color_guide.md */
            --color-bg-primary:   #0d0c18;
            --color-bg-secondary: #1a1830;
            --color-bg-tertiary:  #141220;
            --color-bg-card:      #211f38;
            --color-bg-modal:     #252342;
            --color-border-faint:   #252342;
            --color-text-primary:   #e8e0d0;
            --color-text-secondary: #b8a898;
            --color-gold:        #c9a84c;
            --color-gold-light:  #e8c96a;
            --color-gold-dark:   #9a7a30;
            --color-border-strong:  #c9a84c;
            --color-border-default: #3a3555;
            --font-display: 'Cinzel', serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--color-bg-primary);
            color: var(--color-text-primary);
            font-family: var(--font-body);
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* No scroll requested */
        }

        /* Mock Navigation Bar */
        nav {
            background: var(--color-bg-secondary);
            border-bottom: 1px solid var(--color-border-default);
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--color-text-secondary);
            text-decoration: none;
            font-family: var(--font-display);
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .nav-links a.active {
            color: var(--color-gold);
            border-bottom: 2px solid var(--color-gold);
        }

        .logo {
            font-family: var(--font-display);
            font-weight: 700;
            color: var(--color-gold);
            font-size: 1.3rem;
        }

        /* Main Content Container */
        .page-container {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow-y: auto; 
            scrollbar-width: none;
        }
        .page-container::-webkit-scrollbar { display: none; }

        .hero-banner {
            flex-shrink: 0;
            height: 120px;
            background: linear-gradient(rgba(13, 12, 24, 0.6), rgba(13, 12, 24, 1)),
                        url('https://images.unsplash.com/photo-1599421142814-1f1964f43f8e?q=80&w=2070&auto=format&fit=crop') center/cover;
            display: flex;
            align-items: flex-end;
            padding: 1.5rem 4rem;
        }

        .hero-banner h1 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            color: var(--color-gold);
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .config-content {
            flex: 1;
            padding: 2rem 4rem;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 3rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            align-items: start;
        }

        /* Profile Sidebar */
        .profile-sidebar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .avatar-container {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 3px solid var(--color-gold);
            position: relative;
            background: var(--color-bg-card);
            box-shadow: 0 0 20px rgba(201, 168, 76, 0.2);
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .edit-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 40px;
            height: 40px;
            background: var(--color-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s, background 0.3s;
        }

        .edit-badge:hover {
            background: var(--color-gold-light);
            transform: scale(1.1);
        }

        .edit-badge svg {
            width: 20px;
            height: 20px;
            fill: var(--color-bg-primary);
        }

        /* Form Area */
        .config-form {
            background: var(--color-bg-card);
            padding: 2.5rem;
            border-radius: 8px;
            border: 1px solid var(--color-border-default);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.75rem;
            color: var(--color-text-secondary);
            font-family: var(--font-display);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            background: var(--color-bg-tertiary);
            border: 1px solid var(--color-border-default);
            padding: 1rem;
            color: var(--color-text-primary);
            font-family: var(--font-body);
            border-radius: 4px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--color-gold);
            box-shadow: 0 0 8px rgba(201, 168, 76, 0.2);
        }

        .password-section {
            padding: 0;
            background: rgba(201, 168, 76, 0.05);
            border: 1px dashed var(--color-gold);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            margin-top: 1rem;
        }

        .section-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
        }

        .section-row:not(:last-child) {
            border-bottom: 1px solid var(--color-border-faint);
        }

        .info p {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
        }

        /* Buttons */
        .btn {
            cursor: pointer;
            padding: 0.8rem 2rem;
            border-radius: 4px;
            font-family: var(--font-display);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-gold {
            background: var(--color-gold);
            color: var(--color-bg-primary);
        }

        .btn-gold:hover {
            background: var(--color-gold-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(201, 168, 76, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--color-gold);
            color: var(--color-gold);
        }

        .btn-outline:hover {
            background: rgba(201, 168, 76, 0.1);
        }

        .btn-secondary {
            background: transparent;
            color: var(--color-text-secondary);
        }

        .btn-secondary:hover {
            color: var(--color-text-primary);
        }

        .actions {
            margin-top: 2rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        @media (max-width: 992px) {
            .config-content {
                grid-template-columns: 1fr;
                gap: 2rem;
                padding: 1rem 2rem;
            }
            .profile-sidebar {
                flex-direction: row;
                justify-content: center;
            }
            .hero-banner {
                padding: 1rem 2rem;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">VIKING CW</div>
        <div class="nav-links">
            <a href="#">HOME</a>
            <a href="#">LOBBY</a>
            <a href="#">PERSONAJES</a>
            <a href="#">REGLAS</a>
        </div>
        <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--color-gold); cursor: pointer;"></div>
    </nav>

    <div class="page-container">
        <header class="hero-banner">
            <h1>CONFIGURACIÓN DE GUERRERO</h1>
        </header>

        <main class="config-content">
            <aside class="profile-sidebar">
                <div class="avatar-container">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Erik" alt="Avatar">
                    <div class="edit-badge">
                        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                    </div>
                </div>
                <div style="text-align: center;">
                    <h2 style="font-family: var(--font-display); color: var(--color-gold);">Erik el Rojo</h2>
                </div>
            </aside>

            <section class="config-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" value="erik@valhalla.com" placeholder="tu@email.com">
                </div>

                <div class="form-group">
                    <label>Seguridad</label>
                    <div class="password-section">
                        <div class="section-row">
                            <div class="info">
                                <p style="color: var(--color-text-primary); font-weight: 600;">Contraseña</p>
                            </div>
                            <button class="btn btn-outline" style="padding: 0.5rem 1.5rem; font-size: 0.8rem;">GESTIONAR CLAVE</button>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Preferencias</label>
                    <div class="password-section" style="border-style: solid; border-color: var(--color-border-default); background: transparent;">
                        <div class="section-row">
                            <div class="info">
                                <p style="color: var(--color-text-primary); font-weight: 600;">Lengua del Clan</p>
                                <p>Español (ES)</p>
                            </div>
                            <button class="btn btn-outline" style="padding: 0.5rem 1.5rem; font-size: 0.8rem; border-color: var(--color-border-default); color: var(--color-text-secondary);">CAMBIAR IDIOMA</button>
                        </div>
                        <div class="section-row">
                            <div class="info">
                                <p style="color: var(--color-text-primary); font-weight: 600;">Modo Oscuro</p>
                                <p>Actívalo para descansar la vista</p>
                            </div>
                            <div style="width: 50px; height: 26px; background: var(--color-gold); border-radius: 13px; position: relative; cursor: pointer;">
                                <div style="width: 20px; height: 20px; background: var(--color-bg-primary); border-radius: 50%; position: absolute; right: 3px; top: 3px;"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="actions">
                    <button class="btn btn-secondary">DESCARTAR</button>
                    <button class="btn btn-gold">GUARDAR CAMBIOS</button>
                </div>
            </section>
        </main>
    </div>

</body>
</html>

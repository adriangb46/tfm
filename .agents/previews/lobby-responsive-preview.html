<!-- PREVIEW ONLY — not production code -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby Double Column Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg-primary: #0d0c18;
            --color-bg-secondary: #1a1830;
            --color-bg-card: #211f38;
            --color-bg-tertiary: #141220;
            --color-bg-glass: rgba(33, 31, 56, 0.7);
            --color-text-primary: #e8e0d0;
            --color-text-secondary: #b8a898;
            --color-gold: #c9a84c;
            --color-border-default: #3a3555;
            --color-success: #2d8a4e;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--color-bg-primary); color: var(--color-text-primary); font-family: 'Outfit', sans-serif; overflow: hidden; }

        .navbar { height: 72px; background: var(--color-bg-secondary); border-bottom: 1px solid var(--color-border-default); flex-shrink: 0; }

        .lobby-container {
            display: flex;
            flex-direction: column;
            height: calc(100% - 72px);
            padding: 2rem;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .hero-section {
            background: var(--color-bg-glass);
            border: 1px solid var(--color-border-default);
            border-radius: 12px;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .hero-welcome h2 { margin: 0; font-family: 'Cinzel', serif; color: var(--color-gold); }

        .lists-grid {
            display: flex;
            gap: 1.5rem;
            flex-grow: 1;
            min-height: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .list-column {
            flex: 1; /* Layout 50/50 */
            display: flex;
            flex-direction: column;
            background: var(--color-bg-glass);
            border: 1px solid var(--color-border-default);
            border-radius: 12px;
            padding: 1.5rem;
            min-width: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        /* Clase para esconder la columna */
        .list-column.collapsed {
            flex: 0;
            padding: 0; 
            width: 60px;
            min-width: 60px;
            cursor: pointer;
            background: var(--color-bg-tertiary);
            border-color: var(--color-gold);
        }

        .list-column.collapsed .column-header,
        .list-column.collapsed .scroll-area {
            display: none;
        }

        /* Texto Vertical */
        .vertical-text {
            display: none;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            margin: 0;
            height: 100%;
            width: 100%;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
            color: var(--color-gold);
            letter-spacing: 4px;
            font-size: 1rem;
            white-space: nowrap;
            user-select: none;
        }

        .list-column.collapsed .vertical-text {
            display: flex;
        }

        .column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-shrink: 0;
            cursor: pointer; 
            padding-bottom: 0.5rem;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .column-header:hover { border-color: var(--color-gold); }
        .column-header h2 { font-family: 'Cinzel', serif; font-size: 1.2rem; margin: 0; white-space: nowrap; }
        
        .header-icon { color: var(--color-gold); font-size: 0.8rem; opacity: 0.5; font-weight: 600; }

        .scroll-area {
            flex-grow: 1;
            overflow-y: auto;
        }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--color-border-default); border-radius: 10px; }

        .card { background: var(--color-bg-card); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; border: 1px solid var(--color-border-default); }
        .card-meta { font-size: 0.8rem; color: var(--color-text-secondary); display: flex; justify-content: space-between; align-items: center; }

        .btn { padding: 0.6rem 1.2rem; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; font-size: 0.8rem; }
        .btn-gold { background: var(--color-gold); color: black; }

        @media (max-width: 900px) {
            .lists-grid { flex-direction: column; }
            .list-column { flex: 1; height: 50%; }
            .list-column.collapsed { height: 60px; width: 100%; flex: none; flex-direction: row; }
            .list-column.collapsed .vertical-text { writing-mode: horizontal-tb; transform: none; height: auto; }
        }
    </style>
    <script>
        function toggleColumn() {
            const col = document.getElementById('finished-column');
            col.classList.toggle('collapsed');
        }
    </script>
</head>
<body>
    <div class="navbar"></div>
    <main class="lobby-container">
        
        <section class="hero-section">
            <div class="hero-welcome">
                <h2>BIENVENIDO, GUERRERO</h2>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button class="btn btn-gold">NUEVA PARTIDA</button>
                <button class="btn btn-gold" style="background: transparent; border: 1px solid var(--color-gold); color: var(--color-gold);">UNIRSE</button>
            </div>
        </section>

        <div class="lists-grid">
            <!-- Columna 1: Activas -->
            <section class="list-column">
                <div class="column-header" style="cursor: default; border: none;">
                    <h2>PARTIDAS ACTIVAS</h2>
                </div>
                <div class="scroll-area">
                    <div class="card">
                        <span style="font-weight: 600; display: block; margin-bottom: 0.5rem;">Asedio a Lindisfarne</span>
                        <div class="card-meta">
                            <span>COD: #FJ82K</span>
                            <button class="btn btn-gold">ENTRAR</button>
                        </div>
                    </div>
                    <div class="card"><div class="card-meta"><span>COD: #XP99L</span><button class="btn btn-gold">ENTRAR</button></div></div>
                    <div class="card"><div class="card-meta"><span>COD: #KT11G</span><button class="btn btn-gold">ENTRAR</button></div></div>
                </div>
            </section>

            <!-- Columna 2: Terminadas -->
            <section class="list-column collapsed" id="finished-column">
                <div class="vertical-text" onclick="toggleColumn()">PARTIDAS FINALIZADAS</div>
                
                <div class="column-header" onclick="toggleColumn()">
                    <h2>PARTIDAS FINALIZADAS</h2>
                    <span class="header-icon">▲ ESCONDER</span>
                </div>
                <div class="scroll-area">
                    <div class="card">
                        <span style="font-weight: 600; display: block; margin-bottom: 0.5rem;">Saqueo de París</span>
                        <div class="card-meta">
                            <span style="color: var(--color-success)">VICTORIA</span>
                            <button class="btn" style="background: var(--color-bg-tertiary); color: white;">STATS</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>

    </main>
</body>
</html>

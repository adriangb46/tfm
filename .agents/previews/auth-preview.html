<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview: Auth Modal (Fluid & Resizable) — Viking Clan Wars</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* <!-- PREVIEW ONLY — not production code --> */
        :root {
            --color-bg-primary: #0d0c18;
            --color-bg-glass-rich: rgba(20, 25, 40, 0.95);
            --color-bg-overlay: rgba(0, 0, 0, 0.72);
            --color-text-primary: #e8e0d0;
            --color-text-secondary: #b8a898;
            --color-text-disabled: #5a5068;
            --color-text-inverse: #0d0c18;
            --color-gold: #c9a84c;
            --color-gold-light: #e8c96a;
            --color-gold-muted: rgba(201, 168, 76, 0.15);
            --color-border-default: #3a3555;
            --color-error: #c0392b;
            --color-error-bg: rgba(192, 57, 43, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow: hidden; /* Avoid body scroll */
        }

        /* Modal Overlay Simulation */
        .preview-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--color-bg-overlay);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .auth-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap; 
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 960px;
            height: auto;
            max-height: 100%; /* Fit the container */
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            background: var(--color-bg-glass-rich);
            border: 1px solid var(--color-gold-muted);
            padding: clamp(20px, 4vh, 40px) clamp(20px, 4vw, 40px);
            position: relative;
            border-radius: 4px;
            box-shadow: 0 0 0 1px var(--color-gold-muted), 0 20px 50px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.3s ease;
            max-height: 95vh; /* Ensure it stays within viewport */
        }

        .auth-header {
            text-align: center;
            margin-bottom: clamp(15px, 3vh, 30px);
        }

        .auth-title {
            font-size: clamp(20px, 4vh, 28px);
            font-weight: 800;
            color: var(--color-gold);
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .auth-subtitle {
            font-size: clamp(8px, 1.5vh, 10px);
            letter-spacing: 3px;
            color: var(--color-text-secondary);
            margin-top: 4px;
        }

        .form-title {
            font-size: clamp(14px, 2.5vh, 18px);
            color: var(--color-text-primary);
            margin-bottom: clamp(15px, 2.5vh, 25px);
            text-align: center;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: clamp(12px, 2.2vh, 20px);
        }

        .form-group label {
            display: block;
            font-size: clamp(9px, 1.8vh, 11px);
            font-weight: 700;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .input-container input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--color-border-default);
            padding: clamp(10px, 2vh, 14px) 16px;
            color: var(--color-text-primary);
            border-radius: 2px;
            font-size: clamp(12px, 2vh, 15px);
            outline: none;
        }

        .forgot-link-container {
            text-align: right;
            margin-top: clamp(-10px, -1.5vh, -15px);
            margin-bottom: clamp(12px, 2.2vh, 20px);
        }

        .forgot-link {
            font-size: clamp(9px, 1.8vh, 11px);
            color: var(--color-gold);
            text-decoration: none;
            font-weight: 600;
        }

        .btn-viking-primary {
            width: 100%;
            background: var(--color-gold);
            color: var(--color-text-inverse);
            border: none;
            padding: clamp(12px, 2.5vh, 16px);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            font-size: clamp(11px, 2vh, 14px);
        }

        .auth-footer {
            margin-top: clamp(15px, 3vh, 30px);
            text-align: center;
            border-top: 1px solid var(--color-border-default);
            padding-top: clamp(10px, 2vh, 20px);
        }

        .auth-footer p {
            font-size: clamp(11px, 1.8vh, 13px);
            color: var(--color-text-secondary);
            margin-bottom: 8px;
        }

        .link-viking {
            background: none;
            border: none;
            color: var(--color-gold);
            font-weight: 700;
            cursor: pointer;
            font-size: clamp(11px, 1.8vh, 13px);
        }

        /* Responsive Mobile specific - shrink more aggressively if needed */
        @media (max-height: 600px) {
            .auth-card {
                padding: 15px 30px;
            }
            .auth-header { margin-bottom: 10px; }
            .form-title { margin-bottom: 10px; }
            .auth-footer { margin-top: 15px; }
        }
    </style>
</head>
<body>
    <div class="preview-overlay">
        <div class="auth-container">
            
            <!-- LOGIN VIEW -->
            <div class="auth-card">
                <header class="auth-header">
                    <h1 class="auth-title">Viking Strategy</h1>
                    <p class="auth-subtitle">FORJA TU DESTINO EN EL VALHALLA</p>
                </header>

                <div class="auth-form-container">
                    <h2 class="form-title">Iniciar Sesión</h2>
                    <div class="form-group">
                        <label>Usuario</label>
                        <div class="input-container">
                            <input type="text" placeholder="Tu nombre de usuario">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <div class="input-container">
                            <input type="password" placeholder="Tu contraseña">
                        </div>
                    </div>
                    
                    <div class="forgot-link-container">
                        <a href="#" class="forgot-link">¿Has olvidado la contraseña?</a>
                    </div>

                    <button class="btn-viking-primary">Entrar en Batalla</button>
                    
                    <footer class="auth-footer">
                        <p>¿Aún no tienes cuenta?</p>
                        <button class="link-viking">Regístrate aquí</button>
                    </footer>
                </div>
            </div>

            <!-- SIGNUP VIEW -->
            <div class="auth-card">
                <header class="auth-header">
                    <h1 class="auth-title">Viking Strategy</h1>
                    <p class="auth-subtitle">FORJA TU DESTINO EN EL VALHALLA</p>
                </header>

                <div class="auth-form-container">
                    <h2 class="form-title">Registrarse</h2>
                    <div class="form-group">
                        <label>Usuario</label>
                        <div class="input-container">
                            <input type="text" placeholder="Tu nombre de usuario">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-container">
                            <input type="email" placeholder="tu@email.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <div class="input-container">
                            <input type="password" placeholder="Mínimo 8 caracteres">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Confirmar Contraseña</label>
                        <div class="input-container">
                            <input type="password" placeholder="Repite tu contraseña">
                        </div>
                    </div>

                    <button class="btn-viking-primary">Crear Cuenta</button>
                    
                    <footer class="auth-footer">
                        <p>¿Ya tienes cuenta?</p>
                        <button class="link-viking">Inicia sesión aquí</button>
                    </footer>
                </div>
            </div>

        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Preview - Viking Clan Wars</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* PREVIEW ONLY — not production code */
        :root {
            --color-bg-primary: #0d0c18;
            --color-bg-secondary: #1a1830;
            --color-bg-card: #211f38;
            --color-bg-modal: #252342;
            --color-bg-overlay: rgba(0, 0, 0, 0.72);
            --color-text-primary: #e8e0d0;
            --color-text-secondary: #b8a898;
            --color-gold: #c9a84c;
            --color-gold-light: #e8c96a;
            --color-gold-muted: rgba(201, 168, 76, 0.15);
            --color-border-strong: #c9a84c;
            --color-border-default: #3a3555;
            --color-error: #c0392b;
            --color-success: #2d8a4e;
            --color-info: #4a90d9;
            --color-progress-training: #4a90d9;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: var(--color-bg-primary);
            font-family: 'Lato', sans-serif;
            color: var(--color-text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at center, #1a1830 0%, #0d0c18 100%);
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--color-bg-overlay);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-container {
            position: fixed;
            top: 0;
            right: 0;
            width: 400px;
            height: 100vh;
            background: var(--color-bg-modal);
            border-left: 2px solid var(--color-border-strong);
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.8), inset 5px 0 15px rgba(201, 168, 76, 0.05);
            display: flex;
            flex-direction: column;
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--color-border-default);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .modal-header h2 {
            margin: 0;
            font-family: 'Cinzel', serif;
            color: var(--color-gold);
            letter-spacing: 2px;
            font-size: 1.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .btn-close {
            background: none;
            border: none;
            color: var(--color-text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .btn-close:hover {
            color: var(--color-gold);
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .logs-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .log-item {
            display: flex;
            gap: 1rem;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--color-border-default);
            transition: background 0.2s;
            align-items: center;
        }

        .log-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .log-time {
            font-family: monospace;
            color: var(--color-text-secondary);
            font-size: 0.85rem;
            min-width: 45px;
        }

        .log-icon {
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
        }

        .log-content {
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .log-performer {
            color: var(--color-gold);
            font-weight: bold;
            margin-right: 0.4rem;
        }

        /* Tipos de Log */
        .log-item.type-attack { border-left-color: var(--color-error); background: rgba(192, 57, 43, 0.05); }
        .log-item.type-train { border-left-color: var(--color-info); background: rgba(74, 144, 217, 0.05); }
        .log-item.type-research { border-left-color: #8b5cf6; background: rgba(139, 92, 246, 0.05); }
        .log-item.type-system { border-left-color: var(--color-gold); background: rgba(201, 168, 76, 0.05); }

        .modal-footer {
            padding: 1.25rem 1.5rem;
            border-top: 1px solid var(--color-border-default);
            display: flex;
            justify-content: flex-end;
            background: rgba(0, 0, 0, 0.1);
        }

        .btn-primary {
            padding: 0.75rem 2rem;
            background: var(--color-gold);
            border: none;
            color: var(--color-bg-primary);
            font-family: 'Cinzel', serif;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 2px;
            text-transform: uppercase;
        }

        .btn-primary:hover {
            background: var(--color-gold-light);
            box-shadow: 0 0 15px rgba(201, 168, 76, 0.4);
            transform: translateY(-1px);
        }

        /* Custom Scrollbar */
        .modal-body::-webkit-scrollbar {
            width: 8px;
        }
        .modal-body::-webkit-scrollbar-track {
            background: var(--color-bg-secondary);
        }
        .modal-body::-webkit-scrollbar-thumb {
            background: var(--color-border-default);
            border-radius: 4px;
        }
        .modal-body::-webkit-scrollbar-thumb:hover {
            background: var(--color-gold);
        }

    </style>
</head>
<body>

    <div class="modal-overlay">
        <div class="modal-container">
            <header class="modal-header">
                <h2>LOG DE BATALLA</h2>
                <button class="btn-close">✕</button>
            </header>

            <div class="modal-body">
                <div class="logs-list">
                    <div class="log-item type-train">
                        <span class="log-time">18:45</span>
                        <span class="log-icon">👷</span>
                        <div class="log-content">
                            <span class="log-performer">[Ragnar_Fury]</span>
                            ha entrenado Infantería
                        </div>
                    </div>

                    <div class="log-item type-attack">
                        <span class="log-time">18:48</span>
                        <span class="log-icon">⚔️</span>
                        <div class="log-content">
                            <span class="log-performer">[Ragnar_Fury]</span>
                            ha lanzado un ataque contra Iron
                        </div>
                    </div>

                    <div class="log-item type-research">
                        <span class="log-time">18:50</span>
                        <span class="log-icon">🧪</span>
                        <div class="log-content">
                            <span class="log-performer">[Ragnar_Fury]</span>
                            ha desbloqueado Mejora de Herramientas
                        </div>
                    </div>

                    <div class="log-item type-system">
                        <span class="log-time">18:52</span>
                        <span class="log-icon">📜</span>
                        <div class="log-content">
                            <span class="log-performer">[SISTEMA]</span>
                            La fase de GUERRA ha comenzado
                        </div>
                    </div>

                    <div class="log-item type-attack">
                        <span class="log-time">18:55</span>
                        <span class="log-icon">⚔️</span>
                        <div class="log-content">
                            <span class="log-performer">[Divine]</span>
                            te ha atacado!
                        </div>
                    </div>
                </div>
            </div>

            <footer class="modal-footer">
                <button class="btn-primary">ENTENDIDO</button>
            </footer>
        </div>
    </div>

</body>
</html>

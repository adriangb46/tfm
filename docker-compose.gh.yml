services:
  database-sql:
    image: ghcr.io/adriangb46/tfm-database-sql:latest
    container_name: db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgress
      POSTGRES_DB: tfm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tfm_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  database-nosql:
    image: ghcr.io/adriangb46/tfm-database-nosql:latest
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - tfm_net
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
  
  db-server:
    image: ghcr.io/adriangb46/tfm-db-server:latest
    container_name: db_server
    environment:
      - DB_HANDSHAKE_SECRET=${DB_HANDSHAKE_SECRET}
      - POSTGRES_URL=jdbc:postgresql://database-sql:5432/tfm
      - MONGODB_URL=mongodb://admin:password@database-nosql:27017/vikingclanwars?authSource=admin
    networks:      
      - tfm_net
    depends_on:
      database-sql:
        condition: service_healthy
      database-nosql:
        condition: service_started
    restart: unless-stopped

  middle-server:
    image: ghcr.io/adriangb46/tfm-middle-server:latest
    container_name: middle_server
    ports:
      - "3000:3000"
    environment:
      - DB_SERVER_URL=http://db-server:8080
      - DB_HANDSHAKE_SECRET=${DB_HANDSHAKE_SECRET}
      - MINIO_ENDPOINT=http://storage-minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_AVATARS=avatars
      - MINIO_PUBLIC_BASE_URL=http://localhost:9000/avatars
      - REDIS_URL=redis://cache-redis:6379
    networks:      
      - tfm_net
    depends_on:
      - db-server
      - storage-minio
      - cache-redis
    restart: unless-stopped
  
  cache-redis:
    image: ghcr.io/adriangb46/tfm-cache-redis:latest
    container_name: redis
    networks:
      - tfm_net
    restart: unless-stopped
  
  storage-minio:
    image: ghcr.io/adriangb46/tfm-storage-minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - tfm_net
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - storage-minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://storage-minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/avatars;
      /usr/bin/mc anonymous set public myminio/avatars;
      exit 0;
      "
    networks:
      - tfm_net

  frontend:
    image: ghcr.io/adriangb46/tfm-frontend:latest
    container_name: front
    ports:
      - "${FRONTEND_PUBLISH_PORT:-4200}:80"
    networks:
      - tfm_net
    depends_on:
      - middle-server
    restart: unless-stopped

  bastion:
    image: ghcr.io/adriangb46/tfm-bastion:latest
    container_name: bastion
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - USER_NAME=viking
      - PASSWORD_ACCESS=true
      - USER_PASSWORD=viking_secret # IMPORTANTE: Cambiar en producción o usar claves SSH
    ports:
      - "2222:22"
    networks:
      - tfm_net
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  minio_data:
    driver: local

networks:
  tfm_net:
    driver: bridge
